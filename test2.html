<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>LyS Works • Presupuesto Online</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #020617;
      --card: rgba(15, 23, 42, 0.7);
      --line: rgba(255, 255, 255, 0.08);
      --muted: #94a3b8;
      --title: #f8fafc;
      --cta: #22c55e;
      --cta-ink: #020617;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: "Inter", sans-serif;
      color: #fff;
      min-height: 100vh;
      padding: 20px 16px 180px;
      background: 
        radial-gradient(circle at 0% 0%, rgba(34, 197, 94, 0.12) 0%, transparent 40%),
        #020617;
    }

    .wrap { max-width: 480px; margin: 0 auto; }

    .card {
      background: var(--card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 24px 20px;
      border: 1px solid var(--line);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .brand-logo { display: block; height: 60px; margin: 0 auto 12px auto; }
    h1 { font-size: 20px; text-align: center; font-weight: 900; color: var(--title); margin-bottom: 20px; }

    /* Selector de Vehículos */
    .veh-toggle { 
      margin-bottom: 20px; padding: 16px; border-radius: 20px; 
      background: rgba(0,0,0,0.3); border: 1px solid rgba(34,197,94,0.3);
    }
    .veh-label { font-size: 12px; font-weight: 700; color: var(--cta); margin-bottom: 12px; text-align: center; text-transform: uppercase; }
    .veh-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .veh-btn { 
      padding: 14px 4px; border-radius: 16px; border: 1px solid var(--line); 
      background: rgba(255,255,255,0.05); color: #94a3b8; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .veh-btn span.icon { font-size: 22px; margin-bottom: 2px; }
    .veh-btn small { font-size: 8.5px; font-weight: 400; line-height: 1.2; color: #64748b; text-align: center; display: block; margin-top: 4px; }
    
    .veh-btn.active { 
      background: var(--cta); color: var(--cta-ink); border-color: var(--cta);
      transform: scale(1.05); font-weight: 800;
    }
    .veh-btn.active small { color: rgba(2, 6, 23, 0.7); font-weight: 600; }

    /* Contenedor de Servicios */
    #svc-container { display: none; margin-top: 20px; }
    .svc-title-label { font-size: 11px; color: var(--muted); margin-bottom: 16px; text-transform: uppercase; font-weight: 700; text-align: center; letter-spacing: 1px; }

    /* --- ESTILO PACK FULL REACTIVO --- */
    .combo-full {
      border: 1.5px dashed #334155;
      background: rgba(255, 255, 255, 0.01);
      border-radius: 22px;
      padding: 24px 12px 12px;
      margin-bottom: 16px;
      position: relative;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      animation: slideIn 0.4s ease forwards; opacity: 0;
    }
    
    .combo-badge {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: #64748b;
      font-size: 10px;
      font-weight: 900;
      padding: 6px 16px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.4s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ESTADO ACTIVO PACK FULL */
    .combo-full.active {
      border: 1.5px solid var(--cta);
      background: rgba(34, 197, 94, 0.04);
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.1);
    }
    
    .combo-badge.active {
      background: var(--cta);
      color: var(--cta-ink);
      box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
    }

    /* SERVICIOS */
    .svc { 
      border: 1px solid var(--line); background: rgba(255,255,255,0.02); 
      border-radius: 16px; padding: 14px; display: flex; align-items: flex-start; gap: 14px;
      cursor: pointer; margin-bottom: 10px; transition: 0.3s; 
      animation: slideIn 0.4s ease forwards; opacity: 0;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    
    /* Ajuste para los servicios dentro del combo */
    .combo-full .svc { animation: none; opacity: 1; border-color: rgba(255,255,255,0.04); background: rgba(2, 6, 23, 0.4); margin-bottom: 8px; }
    .combo-full .svc:last-child { margin-bottom: 0; }
    .combo-full.active .svc { border-color: rgba(34, 197, 94, 0.2); background: rgba(2, 6, 23, 0.6); }

    .svc:hover { border-color: rgba(34, 197, 94, 0.4); }
    .svc-check { width: 20px; height: 20px; accent-color: var(--cta); margin-top: 2px; cursor: pointer; }
    .svc-info { flex: 1; }
    .svc-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .svc-title { font-weight: 700; font-size: 14.5px; color: var(--title); }
    .price-pill { font-size: 11px; font-weight: 800; color: var(--cta); background: rgba(34,197,94,0.1); padding: 2px 8px; border-radius: 6px; }
    .svc-desc { color: var(--muted); font-size: 11.5px; line-height: 1.4; }

    /* Barra Totalizadora */
    .total-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, var(--bg) 85%, transparent);
      padding: 20px 16px 30px;
      display: none; flex-direction: column; align-items: center; gap: 12px; z-index: 100;
    }
    .total-amount { color: var(--cta); font-size: 34px; font-weight: 900; text-shadow: 0 0 20px rgba(34,197,94,0.2); }
    .cta-whatsapp {
      width: 100%; max-width: 440px; background: var(--cta); color: var(--cta-ink);
      text-align: center; padding: 16px; border-radius: 16px;
      text-decoration: none; font-weight: 900; font-size: 16px;
      box-shadow: 0 10px 25px rgba(22, 163, 74, 0.3);
      transition: 0.2s;
    }
    .cta-whatsapp:active { transform: scale(0.98); }
  </style>
</head>
<body>

<main class="wrap">
  <section class="card">
    <img src="logo-lys.png" alt="LyS Works" class="brand-logo">
    <h1>Cotizá tu Lavado</h1>

    <div class="veh-toggle">
      <p class="veh-label">1. Elegí tu vehículo</p>
      <div class="veh-buttons">
        <button class="veh-btn" data-type="auto">
          <span class="icon">🚗</span>Auto
          <small>Cronos, Etios, Corolla</small>
        </button>
        <button class="veh-btn" data-type="suv">
          <span class="icon">🚙</span>SUV / Util.
          <small>EcoSport, Kangoo, Strada</small>
        </button>
        <button class="veh-btn" data-type="pickup">
          <span class="icon">🛻</span>Pickup
          <small>Hilux, Amarok, Ranger</small>
        </button>
      </div>
    </div>

    <div id="svc-container">
        <div class="svc-title-label">2. Seleccioná los servicios</div>

        <div class="combo-full" id="full-wrap" style="animation-delay: 0.1s">
          <div class="combo-badge" id="full-badge">✨ PACK FULL</div>

          <label class="svc" for="check-ext">
            <input type="checkbox" class="svc-check" id="check-ext">
            <div class="svc-info">
              <div class="svc-head"><span class="svc-title">Lavado Exterior</span><span class="price-pill" id="p-ext">--</span></div>
              <p class="svc-desc" id="desc-ext"></p>
            </div>
          </label>

          <label class="svc" for="check-int">
            <input type="checkbox" class="svc-check" id="check-int">
            <div class="svc-info">
              <div class="svc-head"><span class="svc-title">Limpieza Interior</span><span class="price-pill" id="p-int">--</span></div>
              <p class="svc-desc" id="desc-int"></p>
            </div>
          </label>
        </div>

        <label class="svc" for="check-suelo" style="animation-delay: 0.3s">
          <input type="checkbox" class="svc-check" id="check-suelo">
          <div class="svc-info">
            <div class="svc-head"><span class="svc-title">Limpieza de Suelo</span><span class="price-pill" id="p-suelo">--</span></div>
            <p class="svc-desc">Extracción profunda de tierra y manchas de la alfombra base.</p>
          </div>
        </label>

        <label class="svc" for="check-steam" style="animation-delay: 0.4s">
          <input type="checkbox" class="svc-check" id="check-steam">
          <div class="svc-info">
            <div class="svc-head"><span class="svc-title">Sanitizado a Vapor</span><span class="price-pill" id="p-steam">--</span></div>
            <p class="svc-desc">Elimina bacterias en conductos de aire y habitáculo a 105°C.</p>
          </div>
        </label>

        <label class="svc" for="check-techo" style="animation-delay: 0.5s">
          <input type="checkbox" class="svc-check" id="check-techo">
          <div class="svc-info">
            <div class="svc-head"><span class="svc-title">Limpieza de Techo</span><span class="price-pill">$10.000</span></div>
            <p class="svc-desc">Remoción manual de manchas cuidando el pegamento original.</p>
          </div>
        </label>

        <label class="svc" for="check-tela" style="animation-delay: 0.6s">
          <input type="checkbox" class="svc-check" id="check-tela">
          <div class="svc-info">
            <div class="svc-head"><span class="svc-title">Tapizados de Tela</span><span class="price-pill" id="p-tela">--</span></div>
            <p class="svc-desc" id="desc-tela"></p>
          </div>
        </label>

        <label class="svc" for="check-cuero" style="animation-delay: 0.7s">
          <input type="checkbox" class="svc-check" id="check-cuero">
          <div class="svc-info">
            <div class="svc-head"><span class="svc-title">Tapizados de Cuero</span><span class="price-pill" id="p-cuero">--</span></div>
            <p class="svc-desc" id="desc-cuero"></p>
          </div>
        </label>
    </div>
  </section>
</main>

<div class="total-bar" id="bar">
  <div class="total-amount" id="total-val">$0</div>
  <a href="#" class="cta-whatsapp" id="btn-ws">Confirmar Turno por WhatsApp</a>
</div>

<script>
  const PRECIOS = {
    auto:   { ext: 15000, int: 20000, suelo: 15000, steam: 15000, tela: 40000, cuero: 15000, techo: 10000 },
    suv:    { ext: 20000, int: 20000, suelo: 20000, steam: 20000, tela: 40000, cuero: 20000, techo: 10000 },
    pickup: { ext: 25000, int: 25000, suelo: 20000, steam: 20000, tela: 45000, cuero: 20000, techo: 10000 }
  };

  const DESCRIPCIONES = {
    auto: {
      ext: "Lavado completo de carrocería con detallado de ruedas, llantas y pasaruedas. Aplicamos cera rápida.",
      int: "Aspirado profundo para extraer polvo en juntas y rincones. Acondicionador y filtro UV mate.",
      tela: "Inyección y extracción profunda en butacas. Eliminamos manchas y olores.",
      cuero: "Limpieza profunda y nutrición con cremas premium para evitar grietas."
    },
    suv: {
      ext: "Tratamiento exterior integral: limpieza de pasaruedas grandes y llantas. Terminación en cera rápida.",
      int: "Limpieza pensada para el uso familiar. Detallado con pinceles y protección UV de base acuosa.",
      tela: "Desinfección total de plazas familiares y remoción de manchas con succión de alta potencia.",
      cuero: "Acondicionamiento especializado para proteger el cuero del desgaste diario."
    },
    pickup: {
      ext: "Lavado reforzado para eliminar tierra del Valle. Limpieza a fondo de llantas y cera rápida.",
      int: "Tratamiento intensivo contra el polvillo. Barrido minucioso y protector UV premium.",
      tela: "Extracción profunda de tierra incrustada. Limpieza de fibras.",
      cuero: "Nutrición profunda para proteger el cuero de la sequedad extrema del clima local."
    }
  };

  let currentType = null;
  const buttons = document.querySelectorAll('.veh-btn');
  const container = document.getElementById('svc-container');
  const bar = document.getElementById('bar');
  const fullWrap = document.getElementById('full-wrap');
  const fullBadge = document.getElementById('full-badge');
  
  const checks = {
    ext: document.getElementById('check-ext'),
    int: document.getElementById('check-int'),
    suelo: document.getElementById('check-suelo'),
    steam: document.getElementById('check-steam'),
    techo: document.getElementById('check-techo'),
    tela: document.getElementById('check-tela'),
    cuero: document.getElementById('check-cuero')
  };

  function update(e) {
    if (!currentType) return;
    
    // Lógica excluyente: Tela o Cuero
    if (e && e.target === checks.tela && checks.tela.checked) checks.cuero.checked = false;
    if (e && e.target === checks.cuero && checks.cuero.checked) checks.tela.checked = false;

    // Auto-check Interior si elige Sanitizado
    if(checks.steam.checked && !checks.int.checked) checks.int.checked = true;

    // ILUMINACIÓN DEL PACK FULL
    if (checks.ext.checked && checks.int.checked) {
      fullWrap.classList.add('active');
      fullBadge.classList.add('active');
    } else {
      fullWrap.classList.remove('active');
      fullBadge.classList.remove('active');
    }

    let total = 0;
    let selected = [];

    for (let key in checks) {
      if (checks[key].checked) {
        total += PRECIOS[currentType][key];
        let title = checks[key].parentElement.querySelector('.svc-title').textContent;
        selected.push(title);
      }
    }

    // Adaptación del texto para WhatsApp si eligen Full
    let displaySelected = [...selected];
    if (checks.ext.checked && checks.int.checked) {
      displaySelected = displaySelected.filter(i => i !== "Lavado Exterior" && i !== "Limpieza Interior");
      displaySelected.unshift("✨ PACK FULL (Exterior + Interior)");
    }

    document.getElementById('total-val').textContent = '$' + total.toLocaleString('es-AR');
    
    const msg = encodeURIComponent(
      `¡Hola LyS Works! 🧼 Consulto presupuesto para mi ${currentType.toUpperCase()}:\n\n` +
      `Servicios seleccionados:\n- ${displaySelected.join('\n- ')}\n\n` +
      `Total estimado: $${total.toLocaleString('es-AR')}`
    );
    document.getElementById('btn-ws').href = `https://wa.me/2995760611?text=${msg}`;
    bar.style.display = total > 0 ? 'flex' : 'none';
  }

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      currentType = btn.dataset.type;
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      container.style.display = 'block';

      // Actualizar Precios Visuales y Descripciones
      for (let k in checks) {
        const pTag = document.getElementById('p-' + k);
        if(pTag) pTag.textContent = '$' + PRECIOS[currentType][k].toLocaleString('es-AR');
      }

      document.getElementById('desc-ext').textContent = DESCRIPCIONES[currentType].ext;
      document.getElementById('desc-int').textContent = DESCRIPCIONES[currentType].int;
      document.getElementById('desc-tela').textContent = DESCRIPCIONES[currentType].tela;
      document.getElementById('desc-cuero').textContent = DESCRIPCIONES[currentType].cuero;

      update();
    });
  });

  document.querySelectorAll('.svc-check').forEach(cb => cb.addEventListener('change', (e) => update(e)));
</script>
</body>
</html>
