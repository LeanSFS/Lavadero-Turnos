<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>LyS Works • Presupuesto Online</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #020617;
      --card: rgba(15, 23, 42, 0.7);
      --line: rgba(255, 255, 255, 0.08);
      --muted: #94a3b8;
      --title: #f8fafc;
      --cta: #22c55e;
      --cta-ink: #020617;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: "Inter", sans-serif;
      color: #fff;
      min-height: 100vh;
      padding: 20px 16px 160px;
      background: 
        radial-gradient(circle at 0% 0%, rgba(34, 197, 94, 0.12) 0%, transparent 40%),
        #020617;
    }

    .wrap { max-width: 480px; margin: 0 auto; }

    .card {
      background: var(--card);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 24px 20px;
      border: 1px solid var(--line);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .brand-logo { display: block; height: 60px; margin: 0 auto 12px auto; }
    h1 { font-size: 20px; text-align: center; font-weight: 900; color: var(--title); margin-bottom: 20px; }

    /* Selector de Vehículos */
    .veh-toggle { 
      margin-bottom: 20px; padding: 16px; border-radius: 20px; 
      background: rgba(0,0,0,0.3); border: 1px solid rgba(34,197,94,0.3);
    }
    .veh-label { font-size: 13px; font-weight: 700; color: var(--cta); margin-bottom: 12px; text-align: center; text-transform: uppercase; }
    .veh-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .veh-btn { 
      padding: 12px 6px; border-radius: 16px; border: 1px solid var(--line); 
      background: rgba(255,255,255,0.05); color: #94a3b8; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .veh-btn span { font-size: 20px; }
    .veh-btn.active { 
      background: var(--cta); color: var(--cta-ink); border-color: var(--cta);
      transform: scale(1.05); font-weight: 800;
    }

    /* Contenedor de Servicios (Oculto al inicio) */
    #svc-container { display: none; margin-top: 20px; }
    .svc-title-label { font-size: 12px; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; font-weight: 700; text-align: center; }

    .svc { 
      border: 1px solid var(--line); background: rgba(255,255,255,0.02); 
      border-radius: 18px; padding: 14px; display: flex; align-items: flex-start; gap: 14px;
      cursor: pointer; margin-bottom: 10px; transition: 0.3s; 
      animation: slideIn 0.4s ease forwards;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    
    .svc:hover { border-color: rgba(34, 197, 94, 0.4); }
    .svc-check { width: 20px; height: 20px; accent-color: var(--cta); margin-top: 2px; }
    .svc-info { flex: 1; }
    .svc-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
    .svc-title { font-weight: 700; font-size: 14.5px; color: var(--title); }
    .price-pill { font-size: 11px; font-weight: 800; color: var(--cta); background: rgba(34,197,94,0.1); padding: 2px 8px; border-radius: 6px; }
    .svc-desc { color: var(--muted); font-size: 11.5px; line-height: 1.4; }

    /* Barra Totalizadora */
    .total-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, var(--bg) 80%, transparent);
      padding: 20px 16px 30px;
      display: none; flex-direction: column; align-items: center; gap: 10px; z-index: 100;
    }
    .total-amount { color: var(--cta); font-size: 32px; font-weight: 900; }
    .cta-whatsapp {
      width: 100%; max-width: 440px; background: var(--cta); color: var(--cta-ink);
      text-align: center; padding: 16px; border-radius: 16px;
      text-decoration: none; font-weight: 800; font-size: 16px;
    }
  </style>
</head>
<body>

<main class="wrap">
  <section class="card">
    <img src="logo-lys.png" alt="LyS Works" class="brand-logo">
    <h1>Cotizá tu Lavado</h1>

    <div class="veh-toggle">
      <p class="veh-label">1. Elegí tu vehículo</p>
      <div class="veh-buttons">
        <button class="veh-btn" data-type="auto"><span>🚗</span>Auto</button>
        <button class="veh-btn" data-type="suv"><span>🚙</span>SUV</button>
        <button class="veh-btn" data-type="pickup"><span>🛻</span>Pickup</button>
      </div>
    </div>

    <div id="svc-container">
        <div class="svc-title-label">2. Seleccioná los servicios</div>

        <label class="svc" for="check-ext" style="animation-delay: 0.1s">
          <input type="checkbox" class="svc-check" id="check-ext">
          <div class="svc-info">
            <div class="svc-head"><span class="svc-title">Lavado Exterior</span><span class="price-pill" id="p-ext">--</span></div>
            <p class="svc-desc">Detallado de llantas y cera de brillo.</p>
          </div>
        </label>

        <label class="svc" for="check-int" style="animation-delay: 0.2s">
          <input type="checkbox" class="svc-check" id="check-int">
          <div class="svc-info">
            <div class="svc-head"><span class="svc-title">Limpieza Interior</span><span class="price-pill" id="p-int">--</span></div>
            <p class="svc-desc">Aspirado full y restauración de plásticos.</p>
          </div>
        </label>

        <label class="svc" for="check-suelo" style="animation-delay: 0.3s">
          <input type="checkbox" class="svc-check" id="check-suelo">
          <div class="svc-info">
            <div class="svc-head"><span class="svc-title">Limpieza de Suelo</span><span class="price-pill" id="p-suelo">--</span></div>
            <p class="svc-desc">Extracción de tierra de la alfombra.</p>
          </div>
        </label>

        <label class="svc" for="check-steam" style="animation-delay: 0.4s">
          <input type="checkbox" class="svc-check" id="check-steam">
          <div class="svc-info">
            <div class="svc-head"><span class="svc-title">Sanitizado a Vapor</span><span class="price-pill" id="p-steam">--</span></div>
            <p class="svc-desc">Elimina bacterias en aire y plásticos.</p>
          </div>
        </label>

        <label class="svc" for="check-techo" style="animation-delay: 0.5s">
          <input type="checkbox" class="svc-check" id="check-techo">
          <div class="svc-info">
            <div class="svc-head"><span class="svc-title">Limpieza de Techo</span><span class="price-pill">$10.000</span></div>
            <p class="svc-desc">Manchas de roce y suciedad del cielo.</p>
          </div>
        </label>

        <label class="svc" for="check-tela" style="animation-delay: 0.6s">
          <input type="checkbox" class="svc-check" id="check-tela">
          <div class="svc-info">
            <div class="svc-head"><span class="svc-title">Tapizados de Tela</span><span class="price-pill" id="p-tela">--</span></div>
            <p class="svc-desc">Lavado profundo con extractor.</p>
          </div>
        </label>

        <label class="svc" for="check-cuero" style="animation-delay: 0.7s">
          <input type="checkbox" class="svc-check" id="check-cuero">
          <div class="svc-info">
            <div class="svc-head"><span class="svc-title">Tapizados de Cuero</span><span class="price-pill" id="p-cuero">--</span></div>
            <p class="svc-desc">Limpieza técnica y nutrición.</p>
          </div>
        </label>
    </div>
  </section>
</main>

<div class="total-bar" id="bar">
  <div class="total-amount" id="total-val">$0</div>
  <a href="#" class="cta-whatsapp" id="btn-ws">Pedir Turno por WhatsApp</a>
</div>

<script>
  const PRECIOS = {
    auto:   { ext: 15000, int: 20000, suelo: 15000, steam: 15000, tela: 40000, cuero: 15000, techo: 10000 },
    suv:    { ext: 20000, int: 20000, suelo: 20000, steam: 20000, tela: 40000, cuero: 20000, techo: 10000 },
    pickup: { ext: 25000, int: 25000, suelo: 20000, steam: 20000, tela: 45000, cuero: 20000, techo: 10000 }
  };

  let currentType = null;
  const buttons = document.querySelectorAll('.veh-btn');
  const container = document.getElementById('svc-container');
  const bar = document.getElementById('bar');

  function update() {
    if (!currentType) return;
    let total = 0;
    let selected = [];

    // Precios visuales
    document.getElementById('p-ext').textContent = '$' + PRECIOS[currentType].ext.toLocaleString('es-AR');
    document.getElementById('p-int').textContent = '$' + PRECIOS[currentType].int.toLocaleString('es-AR');
    document.getElementById('p-suelo').textContent = '$' + PRECIOS[currentType].suelo.toLocaleString('es-AR');
    document.getElementById('p-steam').textContent = '$' + PRECIOS[currentType].steam.toLocaleString('es-AR');
    document.getElementById('p-tela').textContent = '$' + PRECIOS[currentType].tela.toLocaleString('es-AR');
    document.getElementById('p-cuero').textContent = '$' + PRECIOS[currentType].cuero.toLocaleString('es-AR');

    const checks = {
      ext: document.getElementById('check-ext'),
      int: document.getElementById('check-int'),
      suelo: document.getElementById('check-suelo'),
      steam: document.getElementById('check-steam'),
      techo: document.getElementById('check-techo'),
      tela: document.getElementById('check-tela'),
      cuero: document.getElementById('check-cuero')
    };

    // Auto-check Interior si elige Vapor
    if(checks.steam.checked && !checks.int.checked) checks.int.checked = true;

    for (let key in checks) {
      if (checks[key].checked) {
        total += PRECIOS[currentType][key];
        selected.push(key.toUpperCase());
      }
    }

    document.getElementById('total-val').textContent = '$' + total.toLocaleString('es-AR');
    
    const msg = encodeURIComponent(`¡Hola LyS Works! 🧼 Consulto por mi ${currentType.toUpperCase()}:\n\nServicios:\n- ${selected.join('\n- ')}\n\nTotal: $${total.toLocaleString('es-AR')}`);
    document.getElementById('btn-ws').href = `https://wa.me/2995760611?text=${msg}`;
    bar.style.display = total > 0 ? 'flex' : 'none';
  }

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      currentType = btn.dataset.type;
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      container.style.display = 'block';
      update();
    });
  });

  document.querySelectorAll('.svc-check').forEach(cb => cb.addEventListener('change', update));
</script>
</body>
</html>
