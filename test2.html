<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>LyS Works • Presupuesto Online</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #020617;
      --card: rgba(15, 23, 42, 0.7);
      --line: rgba(255, 255, 255, 0.08);
      --muted: #94a3b8;
      --title: #f8fafc;
      --cta: #22c55e;
      --cta-ink: #020617;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: "Inter", sans-serif;
      color: #fff;
      min-height: 100vh;
      padding: 20px 16px 160px; /* Espacio extra para la barra totalizadora */
      background: 
        radial-gradient(circle at 0% 0%, rgba(34, 197, 94, 0.12) 0%, transparent 40%),
        #020617;
      font-size: 15px;
    }

    .wrap { max-width: 480px; margin: 0 auto; }

    .card {
      background: var(--card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 24px 20px;
      border: 1px solid var(--line);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .brand-logo { display: block; height: 70px; margin: 0 auto 12px auto; }
    h1 { font-size: 20px; text-align: center; font-weight: 900; color: var(--title); margin-bottom: 20px; letter-spacing: -0.02em; }

    /* Selector de Vehículos (Igual al Index) */
    .veh-toggle { 
      margin-bottom: 24px; padding: 16px; border-radius: 20px; 
      background: rgba(0,0,0,0.3); border: 1px solid rgba(34,197,94,0.3);
    }
    .veh-label { font-size: 13px; font-weight: 700; color: var(--cta); margin-bottom: 12px; text-align: center; text-transform: uppercase; }
    .veh-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .veh-btn { 
      padding: 12px 6px; border-radius: 16px; border: 1px solid var(--line); 
      background: rgba(255,255,255,0.05); color: #94a3b8; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .veh-btn span { font-size: 20px; }
    .veh-btn.active { 
      background: var(--cta); color: var(--cta-ink); border-color: var(--cta);
      transform: scale(1.05); font-weight: 800;
    }

    /* Items de Servicio (Estilo Checkbox) */
    .svc-container { display: flex; flex-direction: column; gap: 10px; }
    .svc { 
      border: 1px solid var(--line); background: rgba(255,255,255,0.02); 
      border-radius: 18px; padding: 16px; display: flex; align-items: flex-start; gap: 14px;
      cursor: pointer; transition: 0.3s; animation: slideIn 0.4s ease forwards; opacity: 0;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    
    .svc:hover { border-color: rgba(34, 197, 94, 0.4); background: rgba(34, 197, 94, 0.03); }
    .svc-check { width: 22px; height: 22px; accent-color: var(--cta); margin-top: 2px; }
    .svc-info { flex: 1; }
    .svc-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .svc-title { font-weight: 700; font-size: 15px; color: var(--title); }
    .price-pill { font-size: 12px; font-weight: 800; color: var(--cta); background: rgba(34,197,94,0.1); padding: 3px 10px; border-radius: 8px; }
    .svc-desc { color: var(--muted); font-size: 12px; line-height: 1.4; }

    /* Barra de Total Flotante */
    .total-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, var(--bg) 80%, transparent);
      padding: 20px 16px 30px;
      display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 100;
      animation: fadeIn 0.8s ease-out;
    }
    .total-text { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .total-amount { color: var(--cta); font-size: 32px; font-weight: 900; text-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
    .cta-whatsapp {
      width: 100%; max-width: 440px; background: var(--cta); color: var(--cta-ink);
      text-align: center; padding: 16px; border-radius: 16px;
      text-decoration: none; font-weight: 800; font-size: 16px;
      box-shadow: 0 10px 25px rgba(34,197,94,0.4); transition: 0.2s;
    }
    .cta-whatsapp:active { transform: scale(0.98); }
  </style>
</head>
<body>

<main class="wrap">
  <section class="card">
    <img src="logo-lys.png" alt="LyS Works" class="brand-logo">
    <h1>Cotizá tu Lavado</h1>

    <div class="veh-toggle">
      <p class="veh-label">Tipo de vehículo</p>
      <div class="veh-buttons">
        <button class="veh-btn active" data-type="auto"><span>🚗</span>Auto</button>
        <button class="veh-btn" data-type="suv"><span>🚙</span>SUV</button>
        <button class="veh-btn" data-type="pickup"><span>🛻</span>Pickup</button>
      </div>
    </div>

    <div class="svc-container">
      <label class="svc" for="check-ext" style="animation-delay: 0.1s">
        <input type="checkbox" class="svc-check" id="check-ext">
        <div class="svc-info">
          <div class="svc-head">
            <span class="svc-title">Lavado Exterior</span>
            <span class="price-pill" id="p-ext">--</span>
          </div>
          <p class="svc-desc" id="desc-ext">Cera rápida y detallado de llantas.</p>
        </div>
      </label>

      <label class="svc" for="check-int" style="animation-delay: 0.2s">
        <input type="checkbox" class="svc-check" id="check-int">
        <div class="svc-info">
          <div class="svc-head">
            <span class="svc-title">Limpieza Interior</span>
            <span class="price-pill" id="p-int">--</span>
          </div>
          <p class="svc-desc">Aspirado full y restauración de plásticos.</p>
        </div>
      </label>

      <label class="svc" for="check-suelo" style="animation-delay: 0.3s">
        <input type="checkbox" class="svc-check" id="check-suelo">
        <div class="svc-info">
          <div class="svc-head">
            <span class="svc-title">Limpieza de Suelo</span>
            <span class="price-pill" id="p-suelo">--</span>
          </div>
          <p class="svc-desc">Extracción de tierra y manchas de la alfombra.</p>
        </div>
      </label>

      <label class="svc" for="check-steam" style="animation-delay: 0.4s">
        <input type="checkbox" class="svc-check" id="check-steam">
        <div class="svc-info">
          <div class="svc-head">
            <span class="svc-title">Sanitizado a Vapor</span>
            <span class="pill price-pill" id="p-steam">--</span>
          </div>
          <p class="svc-desc">Desinfección de aire y superficies a 105°C.</p>
        </div>
      </label>

      <label class="svc" for="check-techo" style="animation-delay: 0.5s">
        <input type="checkbox" class="svc-check" id="check-techo">
        <div class="svc-info">
          <div class="svc-head">
            <span class="svc-title">Limpieza de Techo</span>
            <span class="price-pill">$10.000</span>
          </div>
          <p class="svc-desc">Técnica manual para manchas de roce.</p>
        </div>
      </label>

      <label class="svc" for="check-tela" style="animation-delay: 0.6s">
        <input type="checkbox" class="svc-check" id="check-tela">
        <div class="svc-info">
          <div class="svc-head">
            <span class="svc-title">Tapizados de Tela</span>
            <span class="price-pill" id="p-tela">--</span>
          </div>
          <p class="svc-desc">Lavado profundo por inyección/extracción.</p>
        </div>
      </label>

      <label class="svc" for="check-cuero" style="animation-delay: 0.7s">
        <input type="checkbox" class="svc-check" id="check-cuero">
        <div class="svc-info">
          <div class="svc-head">
            <span class="svc-title">Tapizados de Cuero</span>
            <span class="price-pill" id="p-cuero">--</span>
          </div>
          <p class="svc-desc">Limpieza técnica y nutrición profunda.</p>
        </div>
      </label>
    </div>
  </section>
</main>

<div class="total-bar">
  <div class="total-text">Total estimado:</div>
  <div class="total-amount" id="total-val">$0</div>
  <a href="#" class="cta-whatsapp" id="btn-ws">Pedir Turno por WhatsApp</a>
</div>

<script>
  // NUEVA TABLA DE PRECIOS UNIFICADA
  const PRECIOS = {
    auto:   { ext: 15000, int: 20000, suelo: 15000, steam: 15000, tela: 40000, cuero: 15000, techo: 10000 },
    suv:    { ext: 20000, int: 20000, suelo: 20000, steam: 20000, tela: 40000, cuero: 20000, techo: 10000 },
    pickup: { ext: 25000, int: 25000, suelo: 20000, steam: 20000, tela: 45000, cuero: 20000, techo: 10000 }
  };

  let currentType = 'auto';
  const vehButtons = document.querySelectorAll('.veh-btn');
  const checkboxes = document.querySelectorAll('.svc-check');
  const totalVal = document.getElementById('total-val');
  const btnWs = document.getElementById('btn-ws');

  // Elementos de precio visual
  const pExt = document.getElementById('p-ext');
  const pInt = document.getElementById('p-int');
  const pSuelo = document.getElementById('p-suelo');
  const pSteam = document.getElementById('p-steam');
  const pTela = document.getElementById('p-tela');
  const pCuero = document.getElementById('p-cuero');

  function update(e) {
    let total = 0;
    let selectedNames = [];

    // Lógica: Si elige Sanitizado, marcar Interior automáticamente
    if (document.getElementById('check-steam').checked && !document.getElementById('check-int').checked) {
      document.getElementById('check-int').checked = true;
    }

    // Lógica Excluyente: Tela O Cuero
    if (e && e.target.id === 'check-tela' && e.target.checked) document.getElementById('check-cuero').checked = false;
    if (e && e.target.id === 'check-cuero' && e.target.checked) document.getElementById('check-tela').checked = false;

    // Actualizar precios visuales en las cards
    pExt.textContent = '$' + PRECIOS[currentType].ext.toLocaleString('es-AR');
    pInt.textContent = '$' + PRECIOS[currentType].int.toLocaleString('es-AR');
    pSuelo.textContent = '$' + PRECIOS[currentType].suelo.toLocaleString('es-AR');
    pSteam.textContent = '$' + PRECIOS[currentType].steam.toLocaleString('es-AR');
    pTela.textContent = '$' + PRECIOS[currentType].tela.toLocaleString('es-AR');
    pCuero.textContent = '$' + PRECIOS[currentType].cuero.toLocaleString('es-AR');

    // Calcular Total
    if(document.getElementById('check-ext').checked) { total += PRECIOS[currentType].ext; selectedNames.push("Exterior"); }
    if(document.getElementById('check-int').checked) { total += PRECIOS[currentType].int; selectedNames.push("Interior"); }
    if(document.getElementById('check-suelo').checked) { total += PRECIOS[currentType].suelo; selectedNames.push("Suelo"); }
    if(document.getElementById('check-steam').checked) { total += PRECIOS[currentType].steam; selectedNames.push("Vapor"); }
    if(document.getElementById('check-techo').checked) { total += PRECIOS[currentType].techo; selectedNames.push("Techo"); }
    if(document.getElementById('check-tela').checked) { total += PRECIOS[currentType].tela; selectedNames.push("Tap. Tela"); }
    if(document.getElementById('check-cuero').checked) { total += PRECIOS[currentType].cuero; selectedNames.push("Tap. Cuero"); }

    totalVal.textContent = '$' + total.toLocaleString('es-AR');

    // Generar mensaje de WhatsApp
    const msg = encodeURIComponent(
      `¡Hola LyS Works! 🧼 Quiero un turno para mi ${currentType.toUpperCase()}:\n\n` +
      `Servicios elegidos:\n- ${selectedNames.join('\n- ')}\n\n` +
      `Total estimado: $${total.toLocaleString('es-AR')}\n` +
      `*(Sujeto a revisión visual)*`
    );
    btnWs.href = `https://wa.me/2995760611?text=${msg}`;
  }

  vehButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      vehButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentType = btn.dataset.type;
      update();
    });
  });

  checkboxes.forEach(cb => cb.addEventListener('change', (e) => update(e)));
  
  // Iniciar con valores por defecto
  update();
</script>

</body>
</html>
